        run: |
          archive="$RUNNER_TEMP/history.fi.xz"
          printf '%s' "$HISTORY_B64" | base64 --decode > "$archive"
          echo "240f7ce188e8908d3eb628934c32bb9ae17f77e4043bb1add0fb2e73a467131a  $archive" | sha256sum --check -
          xz --decompress --stdout "$archive" | git fast-import --force --quiet

          lock_dir="$RUNNER_TEMP/lock"
          mkdir -p "$lock_dir"
          git show refs/heads/main:pyproject.toml > "$lock_dir/pyproject.toml"
          uv lock --project "$lock_dir"
          test "$(git hash-object "$lock_dir/uv.lock")" = "3f3856df47b95a941c223365d3d6c40c1253ef84"
          lock_blob="$(git hash-object -w "$lock_dir/uv.lock")"

          FILTER_BRANCH_SQUELCH_WARNING=1 git filter-branch --force \
            --index-filter "git update-index --add --cacheinfo 100644,$lock_blob,uv.lock" \
            -- refs/heads/main
          test "$(git rev-parse refs/heads/main)" = "475d7156bdc0c7846a26c01d04a39517368a2e40"
          git reset --hard refs/heads/main
          test "$(git ls-tree -r refs/heads/main | wc -l | tr -d ' ')" = "21"
          git push --force origin refs/heads/main:refs/heads/main
